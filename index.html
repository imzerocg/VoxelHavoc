<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel Havoc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Start Menu: Original Modal Style + Blueprint Layout -->
    <div id="ui-layer">
        <button id="log-btn" onclick="showLogs()">Update Logs</button>
        <div id="start-screen">
            <div class="modal">
                <h1>Voxel Havoc</h1>
                
                <div class="menu-section">
                    <h3>Maps</h3>
                    <div class="menu-grid">
                        <button class="map-btn" onclick="setMap('Volcano')">Volcano</button>
                        <button class="map-btn active" onclick="setMap('Coastal')">Coastal</button>
                        <button class="map-btn" onclick="setMap('Mountains')">Mountains</button>
                    </div>
                </div>

                <div class="menu-section">
                    <h3>Gamemodes</h3>
                    <div class="menu-grid">
                        <button class="mode-btn active" onclick="setMode('Civilization')">Civilization</button>
                        <button class="mode-btn" onclick="setMode('Normal')">Normal</button>
                        <button class="mode-btn" onclick="setMode('Animal War')">Animal War</button>
                        <button class="mode-btn" onclick="setMode('Modern')">Modern</button>
                    </div>
                </div>

                <button class="play-btn" onclick="startGame()">Start Havoc</button>
            </div>
        </div>
    </div>

    <!-- Update Logs -->
    <div id="log-modal">
        <div class="log-content">
            <h2 style="color: #3498db; margin-top: 0;">Update Logs</h2>
            <ul id="log-list" style="text-align: left; color: #ccc; line-height: 1.6;">
                <li><strong style="color:white">V24.3:</strong> Reverted to Classic UI. Removed elemental powers. Added Smite All.</li>
                <li><strong style="color:white">V24.2:</strong> Sidebar UI revamp and hit-flash fix.</li>
                <li><strong style="color:white">V24.1:</strong> Map & Mode Selectors per blueprint.</li>
            </ul>
            <button onclick="hideLogs()" style="background: #e74c3c;">Close</button>
        </div>
    </div>

    <!-- Classic Sidebar -->
    <div id="sidebar">
        <h2>VOXEL HAVOC</h2>
        <div class="stat-panel">
            <b style="font-size:1.1em">Units: <span id="total-count" style="color:#2ecc71">0</span></b><br>
            Map: <span id="current-map-ui" style="color:#3498db;">Coastal</span> | Mode: <span id="current-mode-ui" style="color:#9b59b6;">Civ</span><br>
            Tool: <span id="current-tool" style="color:#f1c40f;">Normal</span>
        </div>
        
        <div style="margin-bottom: 10px;">
            <label style="font-size: 0.85em; font-weight: bold; color: #ddd;">Battle Speed: <span id="speed-val">1x</span></label>
            <input type="range" id="speedSlider" min="1" max="5" value="1" style="width: 100%; cursor: pointer;">
        </div>

        <button id="teamToggle" onclick="toggleTeam()" class="team-btn" style="background:#3498db">Team: BLUE</button>
        <div class="grid-2">
            <button onclick="toggleCiv()" id="civBtn" style="background:#8e44ad">Civ: ON [C]</button>
            <button onclick="toggleWall()" id="wallBtn" style="background:#c0392b">Wall: CLOSED [Spc]</button>
        </div>
        <hr>
        <div class="grid-2">
            <button onclick="setPower('spawn-normal', this)" class="active">Normal [1]</button>
            <button onclick="setPower('spawn-archer', this)">Archer [2]</button>
            <button onclick="setPower('spawn-knight', this)">Knight [3]</button>
            <button onclick="setPower('spawn-ninja', this)">Ninja [4]</button>
            <button onclick="setPower('spawn-swapper', this)">Swapper [5]</button>
            <button onclick="setPower('spawn-shifter', this)">Shifter [6]</button>
            <button onclick="setPower('spawn-elephant', this)">Elephant [7]</button>
            <button onclick="setPower('cannon', this)">Cannon [8]</button>
        </div>
        <hr>
        <div class="grid-2">
            <button onclick="setPower('spawn-luffy', this)" class="anime-btn">Luffy</button>
            <button onclick="setPower('spawn-gojo', this)" class="anime-btn">Gojo</button>
            <button onclick="setPower('spawn-naruto', this)" class="anime-btn">Naruto</button>
            <button onclick="setPower('spawn-goku', this)" class="anime-btn">Goku</button>
            <button onclick="setPower('spawn-ichigo', this)" class="anime-btn" style="background:#fff">Ichigo</button>
            <button onclick="setPower('spawn-zoro', this)" class="anime-btn" style="background:#2ecc71">Zoro</button>
            <button onclick="setPower('spawn-sukuna', this)" class="anime-btn" style="background:#c0392b; color:white;">Sukuna</button>
            <button onclick="setPower('spawn-eren', this)" class="anime-btn" style="background:#7f8c8d; color:white;">Eren</button>
        </div>
        <hr>
        
        <!-- NEW: Replaced Powers with Smite & Smite All -->
        <div class="grid-2">
            <button onclick="setPower('strike', this)">⚡ Smite</button>
            <button onclick="smiteAll()" style="background:#c0392b; border-color:#e74c3c">☠️ Smite All</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="js/globals.js"></script>
    <script src="js/civilization.js"></script>
    <script src="js/others.js"></script>
    <script src="js/units.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
